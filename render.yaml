# ==================== Render 部署配置 ====================
# 把项目推到 GitHub 后，在 Render 用 Blueprint 一键部署
# 数据库使用 Neon（免费云 PostgreSQL），不占用 Render 配额

services:
  # ---------- 后端 API ----------
  - type: web
    name: internship-tracker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
        value: postgresql://user:password@host/database?sslmode=require
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  # ---------- 前端页面 ----------
  - type: static
    name: internship-tracker-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: internship-tracker-api
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
