# ==================== Render 部署配置 ====================
# 把项目推到 GitHub 后，Render 会自动读取此文件并部署

services:
  # ---------- 后端 API ----------
  - type: web
    name: internship-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: internship-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  # ---------- 前端页面 ----------
  - type: static
    name: internship-tracker-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: internship-tracker-api
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: internship-tracker-db
    plan: free
