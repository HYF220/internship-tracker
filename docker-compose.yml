# ==================== Docker Compose ====================
# 一键启动：backend + frontend（数据库使用 Neon 云端 PostgreSQL）
#
# 使用方法：
#   1. 先配置 backend/.env（复制 .env.example 并填入 Neon 连接字符串）
#   2. docker compose up -d        # 后台启动
#   3. docker compose down         # 停止并删除容器
#   4. docker compose logs -f      # 查看日志

version: "3.9"

services:
  # ========== 后端 API ==========
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads

  # ========== 前端 ==========
  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  uploads:
