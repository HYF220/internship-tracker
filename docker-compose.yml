# ==================== Docker Compose ====================
# 一键启动整个项目：postgres + backend + frontend
#
# 使用方法：
#   docker compose up -d        # 后台启动
#   docker compose down         # 停止并删除容器
#   docker compose logs -f      # 查看日志

version: "3.9"

services:
  # ========== 数据库 ==========
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: internship_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ========== 后端 API ==========
  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/internship_tracker
      SECRET_KEY: change-this-to-a-random-secret-key-in-production
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads

  # ========== 前端 ==========
  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads:
